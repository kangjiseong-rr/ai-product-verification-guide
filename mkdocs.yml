site_name: AI 제품 및 서비스 확인제 기업용 가이드라인
site_description: AI 제품 및 서비스 확인제 기업용 가이드라인 Markdown 문서
site_url: https://kangjiseong-rr.github.io/ai-product-verification-guide/
repo_name: kangjiseong-rr/ai-product-verification-guide
repo_url: https://github.com/kangjiseong-rr/ai-product-verification-guide
edit_uri: edit/main/docs/

theme:
  name: material
  language: ko
  features:
    - navigation.top
    - toc.follow
    - search.highlight
    - content.code.copy
  palette:
    - scheme: default
      primary: teal
      accent: cyan
  font:
    text: Noto Sans KR
    code: Roboto Mono

plugins:
  - search:
      lang:
        - ko
        - en

markdown_extensions:
  - tables
  - toc:
      permalink: true
  - attr_list
  - md_in_html

nav:
  - 홈: index.md
